<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <style>
        body  {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a2e, #16213e, #000000);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        h1 {
            font-size: 80px;
            margin: 0;
            background: linear-gradient(to right, #ff0000, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 10px;
        }
        .desc { font-size: 1.2rem; color: #ccc; margin-top: 20px; }
        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: #ff0000;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #cc0000; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>F1 ULTIMATE</h1>
        <p class="desc">تكنولوجيا السرعة، هندسة المستقبل، فورميلا 1.</p>
        
        <video width="500" controls style="border-radius: 20px; margin-top: 20px;">
            <source src="f1.mp4" type="video/mp4">
        </video>
        <br>
        <button class="btn" onclick="alert('جاري تشغيل محركات F1...')">ابدأ التجربة</button>
    </div>
</body>
</html>
